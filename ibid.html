<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIP Calculator</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7124997657591492"
     crossorigin="anonymous"></script>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 600px;
    margin: 20px auto;
    padding: 20px;
}

.container {
    border: 1px solid #ddd;
    padding: 20px;
    border-radius: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 12px;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    font-size: 18px;
}
</style>
</head>
<body>

<div class="container">
    <h1>SIP Calculator</h1>

    <label>Monthly Investment (₹)</label>
    <input type="number" id="monthlyInvestment" placeholder="5000">

    <label>Expected Annual Return (%)</label>
    <input type="number" id="annualReturn" placeholder="12">

    <label>Investment Period (Years)</label>
    <input type="number" id="years" placeholder="10">

    <button onclick="calculateSIP()">Calculate SIP</button>

    <div class="result" id="result"></div>
</div>

<script>
function calculateSIP() {

    let P = parseFloat(document.getElementById("monthlyInvestment").value);
    let annualRate = parseFloat(document.getElementById("annualReturn").value);
    let years = parseFloat(document.getElementById("years").value);

    let r = annualRate / 12 / 100;
    let n = years * 12;

    let futureValue =
        P * (((Math.pow(1 + r, n) - 1) / r) * (1 + r));

    let investedAmount = P * n;
    let wealthGained = futureValue - investedAmount;

    document.getElementById("result").innerHTML = `
        <p><strong>Total Invested:</strong> ₹${investedAmount.toFixed(2)}</p>
        <p><strong>Estimated Returns:</strong> ₹${wealthGained.toFixed(2)}</p>
        <p><strong>Maturity Value:</strong> ₹${futureValue.toFixed(2)}</p>
    `;
}
</script>

</body>
</html>
